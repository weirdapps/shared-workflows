name: Reusable Dependency Refresh

# Reusable npm dependency-refresh: npm update -> validate (gate_cmd) -> open a
# PR. Callers set their schedule + gate command and MUST declare write
# permissions (a reusable can't escalate beyond the caller's grant).
# Command inputs run via env vars (bash -c "$VAR"), never interpolated into run.

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node version"
        required: false
        type: string
        default: "lts/*"
      setup_cmd:
        description: "Optional extra setup before refresh"
        required: false
        type: string
        default: ""
      refresh_cmd:
        description: "Lockfile refresh command"
        required: false
        type: string
        default: |
          npm update
          npm install
      gate_cmd:
        description: "Validation command that must pass before a PR opens"
        required: true
        type: string
    secrets:
      PUSH_PAT:
        description: "Optional PAT for opening the PR; falls back to GITHUB_TOKEN"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node_version }}
      - if: ${{ inputs.setup_cmd != '' }}
        name: Extra setup
        env:
          SETUP_CMD: ${{ inputs.setup_cmd }}
        run: bash -euo pipefail -c "$SETUP_CMD"
      - name: Refresh dependencies
        env:
          REFRESH_CMD: ${{ inputs.refresh_cmd }}
        run: bash -euo pipefail -c "$REFRESH_CMD"
      - name: Validate
        env:
          GATE_CMD: ${{ inputs.gate_cmd }}
        run: bash -euo pipefail -c "$GATE_CMD"
      # peter-evans/create-pull-request v8.1.1
      - name: Open PR with refreshed lockfile
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.PUSH_PAT || github.token }}
          branch: deps/monthly-refresh
          delete-branch: true
          commit-message: "deps: monthly dependency refresh"
          title: "deps: monthly dependency refresh"
          body: |
            Automated monthly dependency refresh via the shared reusable
            workflow (weirdapps/shared-workflows). Validation passed.
            Review and merge if green.
          labels: dependencies
